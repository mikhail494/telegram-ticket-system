name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check production TypeScript
        run: npm exec tsc -- -p tsconfig.json --noEmit

      - name: Check test TypeScript
        run: npm run test:typecheck

      - name: Run automated tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Verify Docker image build
        run: docker build -t telegram-ticket-system-ci .
